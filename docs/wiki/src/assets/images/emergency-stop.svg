<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Yellow flat base -->
  <rect x="50" y="90" width="100" height="70" rx="8" fill="#facc15"/>
  <rect x="50" y="85" width="100" height="20" rx="8" fill="#fde047"/>

  <!-- Red button -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,0; 0,8; 0,8; 0,8; 0,0; 0,0"
      keyTimes="0; 0.1; 0.2; 0.5; 0.6; 0.7; 1"
      dur="6s" repeatCount="indefinite"/>
    <!-- Button body -->
    <rect x="68" y="62" width="64" height="28" rx="4" fill="#dc2626"/>
    <!-- Button top -->
    <ellipse cx="100" cy="62" rx="32" ry="8" fill="#ef4444"/>

    <!-- ON text (visible when pressed) -->
    <text x="100" y="81" text-anchor="middle" font-family="Arial, sans-serif"
      font-size="13" fill="white" font-weight="800" letter-spacing="2">
      <animate attributeName="opacity"
        values="0;0;1;1;1;0;0"
        keyTimes="0;0.1;0.2;0.5;0.6;0.7;1"
        dur="6s" repeatCount="indefinite"/>
      ON
    </text>
    <!-- OFF text (visible when released) -->
    <text x="100" y="81" text-anchor="middle" font-family="Arial, sans-serif"
      font-size="13" fill="white" font-weight="800" letter-spacing="2">
      <animate attributeName="opacity"
        values="1;1;0;0;0;1;1"
        keyTimes="0;0.1;0.2;0.5;0.6;0.7;1"
        dur="6s" repeatCount="indefinite"/>
      OFF
    </text>
  </g>

  <!-- Bottom edge -->
  <rect x="50" y="155" width="100" height="5" rx="2" fill="#e5e7eb"/>
</svg>
