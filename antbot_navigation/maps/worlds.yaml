# World configuration for AntBot simulation
# Maps world names to their SDF world file and Nav2 map file.
# Usage: ros2 launch antbot_gazebo gazebo.launch.py world:=depot
#        ros2 launch antbot_navigation navigation.launch.py world:=depot mode:=sim

worlds:
  depot:
    sdf: depot.sdf
    map: depot_sim.yaml
  # empty world uses the SDF bundled with antbot_gazebo
  # empty:
  #   sdf: empty.sdf
  #   map: ""
